name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    # Mirrors the connector's 6-hour fetch cadence — pure uptime monitoring.
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  # 1.1 — Fail if a developer pushed an API key / token / sensitive endpoint.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so leaks in past commits are caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # 1.3 — Linting / coding best practices.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  # 1.4 — Confirm the Docker image builds, then run unit tests on the scripts.
  docker-build-test:
    name: Docker build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t osm-opencti:ci .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests with coverage
        run: |
          # libmagic is a runtime dependency of pycti (python-magic).
          sudo apt-get update && sudo apt-get install -y libmagic1
          pip install -r requirements.txt pytest pytest-cov
          pytest -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html:coverage-html \
            --cov-report=xml:coverage.xml

      - name: Publish coverage to run summary
        if: always()
        run: |
          {
            echo "## Unit test coverage"
            echo '```'
            # Re-render the table from the coverage data (no re-run).
            python -m coverage report 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-html/
            coverage.xml

  # 1.2 — Is the opensourcemalware endpoint UP? Non-blocking: a 3rd-party outage
  #        should never block your merges. Reports status as a warning instead.
  endpoint-health:
    name: OSM endpoint health (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Probe opensourcemalware API
        run: |
          url="https://api.opensourcemalware.com/functions/v1/query-latest?ecosystem=npm"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
          echo "HTTP status: $code"
          # The API answering at all means it's up — 401 "API token required" is a
          # valid auth response. Only a 5xx or an unreachable host (000) is "down".
          case "$code" in
            000|5*)
              echo "::warning::opensourcemalware API may be DOWN (HTTP $code)"
              exit 1
              ;;
            *)
              echo "opensourcemalware API is reachable (HTTP $code)."
              ;;
          esac
